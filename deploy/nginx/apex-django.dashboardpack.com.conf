# Apex Django demo — apex-django.dashboardpack.com
#
# Drop into /etc/nginx/sites-available/, symlink into sites-enabled/,
# then `nginx -t && systemctl reload nginx`.
#
# Architecture:
#   Cloudflare (TLS termination, DDoS shield, CDN)
#         │
#         ▼ (origin pull over HTTPS)
#   nginx (this vhost) — terminates TLS with the Cloudflare Origin Cert,
#                        serves /static/ via WhiteNoise (or directly),
#                        proxies everything else to Daphne
#         │
#         ▼ (unix socket)
#   Daphne ASGI (apex-django.service) — Django HTTP + WebSocket
#
# TLS: this vhost expects an Origin Certificate from Cloudflare
# (https://developers.cloudflare.com/ssl/origin-configuration/origin-ca/).
# In Cloudflare DNS set an A record for apex-django → server IP, orange-cloud on,
# SSL/TLS mode "Full (strict)".

# WebSocket upgrade map — required for /ws/ to work with HTTP/1.1.
# Define ONCE per nginx config; if you already have one for another vhost,
# delete this map block here.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Apex visits over plain HTTP go straight to HTTPS. Cloudflare's
# Always-Use-HTTPS does this at the edge too; this is belt-and-suspenders
# for direct origin requests.
server {
    listen 80;
    listen [::]:80;
    server_name apex-django.dashboardpack.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name apex-django.dashboardpack.com;

    # ── TLS (Cloudflare Origin Certificate) ───────────────────────────
    # Generate at: Cloudflare → SSL/TLS → Origin Server → Create Certificate.
    # Save the cert + key as below; Cloudflare's Origin certs last 15 years.
    ssl_certificate     /etc/ssl/cloudflare/apex-django.dashboardpack.com.crt;
    ssl_certificate_key /etc/ssl/cloudflare/apex-django.dashboardpack.com.key;
    # Authenticated origin pulls — only Cloudflare can hit this vhost on 443.
    # Download the CA from https://developers.cloudflare.com/ssl/static/authenticated_origin_pull_ca.pem
    # and place at the path below. Comment these two lines if you want
    # direct origin access (e.g. for a health checker).
    ssl_client_certificate /etc/ssl/cloudflare/authenticated_origin_pull_ca.pem;
    ssl_verify_client on;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # ── Cloudflare real client IP ─────────────────────────────────────
    # So Django sees the visitor IP, not Cloudflare's edge IP. Refresh
    # this list periodically: https://www.cloudflare.com/ips/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Logging ───────────────────────────────────────────────────────
    access_log /var/log/nginx/apex-django.access.log;
    error_log  /var/log/nginx/apex-django.error.log warn;

    # Upload size cap — bumped from default 1M for the Files app.
    client_max_body_size 25m;

    # ── Static files ──────────────────────────────────────────────────
    # WhiteNoise can serve these in-process; serving via nginx is faster
    # and saves Daphne the round-trip. Adjust the alias path to wherever
    # `python manage.py collectstatic` writes.
    location /static/ {
        alias /var/www/apex-django/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # User-uploaded files (Files app, avatars, org logos). Served from
    # MEDIA_ROOT which defaults to <project>/user_files/. Tighten ACL
    # later (signed URLs, HTTP basic auth, etc.) if the demo gets
    # sensitive uploads.
    location /media/ {
        alias /var/www/apex-django/user_files/;
        access_log off;
        expires 7d;
    }

    # ── WebSocket — /ws/* upgrades to long-lived connections ──────────
    location /ws/ {
        proxy_pass http://unix:/run/apex-django/apex-django.sock;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Everything else — Django HTTP via Daphne ──────────────────────
    location / {
        proxy_pass http://unix:/run/apex-django/apex-django.sock;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }
}
