# Render Blueprint per IceTimes CRM (Apex Django).
# Provisiona: web service (Daphne ASGI) + Postgres 16 + Redis.
# Tutti i servizi partono sul piano free; alzare `plan:` per la produzione.
#
# Dopo il primo deploy:
#   - login demo: demo / ApexShowcase!2026 (rimuovere seed_demo per il go-live)
#   - aggiungere il dominio custom in ALLOWED_HOSTS quando viene collegato

services:
  - type: web
    name: icetimes-crm
    runtime: python
    region: frankfurt
    plan: free                             # → starter ($7/mo) per produzione
    healthCheckPath: /__health/
    autoDeploy: true                       # deploy a ogni push su main

    buildCommand: |
      pip install --quiet uv
      uv sync --frozen --extra realtime --extra sentry
      npm ci
      npm run build
      uv run python manage.py collectstatic --no-input
      uv run python manage.py migrate --no-input
      # Svuota il database quando FLUSH_DATA=true (one-shot, poi rimettere a false).
      if [ "$FLUSH_DATA" = "true" ]; then uv run python manage.py flush --no-input; fi
      # Crea/aggiorna l'utente amministratore reale dalle env ADMIN_*.
      uv run python manage.py bootstrap_admin

    # Daphne ASGI. Render inietta $PORT automaticamente.
    startCommand: |
      uv run daphne -b 0.0.0.0 -p $PORT --proxy-headers apex.asgi:application

    envVars:
      - key: PYTHON_VERSION
        value: "3.13.4"

      - key: DJANGO_SETTINGS_MODULE
        value: apex.settings.prod

      - key: SECRET_KEY
        generateValue: true                # Render genera una stringa random di 50 caratteri

      - key: ALLOWED_HOSTS
        value: "icetimes.it,www.icetimes.it,.onrender.com"

      - key: DATABASE_URL
        fromDatabase:
          name: icetimes-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: redis
          name: icetimes-redis
          property: connectionString

      - key: DEMO_MODE
        value: "false"

      - key: FLUSH_DATA
        value: "false"                     # "true" per svuotare il DB al prossimo deploy

      # ── Aggiornamento stati lead (senza queste due gli stati restano
      #    congelati su "inviato": il poller non parte e i postback dei
      #    broker vengono respinti). ──────────────────────────────────────
      - key: LEAD_POLLER
        value: "true"                      # avvia il poller in-process (pull stati ogni LEAD_POLL_SECONDS)
      - key: LEAD_POLL_SECONDS
        value: "60"                        # intervallo pull broker (min 5s)
      - key: LEADS_POSTBACK_TOKEN
        sync: false                        # token segreto del postback /postback?token=… (impostalo anche nel pannello del broker)

      - key: ADMIN_USERNAME
        sync: false

      - key: ADMIN_EMAIL
        sync: false

      - key: ADMIN_PASSWORD
        sync: false

      - key: CRM_API_BASE_URL
        sync: false

      - key: CRM_API_KEY
        sync: false

  - type: redis
    name: icetimes-redis
    plan: free
    region: frankfurt
    ipAllowList: []                        # solo i servizi Render possono connettersi
    maxmemoryPolicy: allkeys-lru

databases:
  - name: icetimes-db
    plan: free                             # → starter ($7/mo) per produzione
    postgresMajorVersion: "16"
    region: frankfurt                      # deve combaciare con la region del web service
