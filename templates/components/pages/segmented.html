{% extends "components/_detail_layout.html" %}
{% load apex %}

{% block component_body %}
<div class="space-y-8">

  <div class="rounded-lg border border-border bg-card p-6">
    <h2 class="text-sm font-semibold mb-1">2 segments</h2>
    <p class="text-xs text-muted-foreground mb-4">Common toggle for billing cadence or theme mode.</p>
    <div x-data="{value: 'monthly'}" role="radiogroup" aria-label="Billing cadence" class="inline-flex w-fit items-center bg-muted p-1 rounded-md">
      <button type="button" role="radio" :aria-checked="value==='monthly'" @click="value='monthly'"
              class="h-8 px-4 text-xs font-medium rounded transition"
              :class="value==='monthly' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'">
        Monthly
      </button>
      <button type="button" role="radio" :aria-checked="value==='yearly'" @click="value='yearly'"
              class="h-8 px-4 text-xs font-medium rounded transition inline-flex items-center gap-1.5"
              :class="value==='yearly' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'">
        Yearly
        <span class="inline-flex items-center px-1.5 h-4 rounded text-[9px] font-semibold bg-success/15 text-success">-20%</span>
      </button>
    </div>
  </div>

  <div class="rounded-lg border border-border bg-card p-6">
    <h2 class="text-sm font-semibold mb-1">3 segments</h2>
    <div x-data="{value: 'system'}" role="radiogroup" aria-label="Theme" class="inline-flex w-fit items-center bg-muted p-1 rounded-md">
      <button type="button" role="radio" :aria-checked="value==='light'" @click="value='light'"
              class="h-8 px-3 text-xs font-medium rounded transition inline-flex items-center gap-1.5"
              :class="value==='light' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'">
        {% icon "sun" 14 %} Light
      </button>
      <button type="button" role="radio" :aria-checked="value==='dark'" @click="value='dark'"
              class="h-8 px-3 text-xs font-medium rounded transition inline-flex items-center gap-1.5"
              :class="value==='dark' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'">
        {% icon "moon" 14 %} Dark
      </button>
      <button type="button" role="radio" :aria-checked="value==='system'" @click="value='system'"
              class="h-8 px-3 text-xs font-medium rounded transition inline-flex items-center gap-1.5"
              :class="value==='system' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'">
        {% icon "settings" 14 %} System
      </button>
    </div>
  </div>

  <div class="rounded-lg border border-border bg-card p-6">
    <h2 class="text-sm font-semibold mb-1">4 segments · full-width</h2>
    <p class="text-xs text-muted-foreground mb-4">Stretches to fill the container — useful inside cards.</p>
    <div x-data="{value: 'all'}" role="radiogroup" aria-label="Status filter" class="flex w-full items-center bg-muted p-1 rounded-md">
      <button type="button" role="radio" :aria-checked="value==='all'" @click="value='all'"
              class="flex-1 h-8 text-xs font-medium rounded transition"
              :class="value==='all' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'">All</button>
      <button type="button" role="radio" :aria-checked="value==='active'" @click="value='active'"
              class="flex-1 h-8 text-xs font-medium rounded transition"
              :class="value==='active' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'">Active</button>
      <button type="button" role="radio" :aria-checked="value==='pending'" @click="value='pending'"
              class="flex-1 h-8 text-xs font-medium rounded transition"
              :class="value==='pending' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'">Pending</button>
      <button type="button" role="radio" :aria-checked="value==='archived'" @click="value='archived'"
              class="flex-1 h-8 text-xs font-medium rounded transition"
              :class="value==='archived' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'">Archived</button>
    </div>
  </div>

</div>
{% endblock %}
