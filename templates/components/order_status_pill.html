{% if status == 'paid' %}<span class="inline-flex items-center text-xs font-medium rounded-full px-2.5 py-0.5 bg-success/10 text-success">{{ label }}</span>{% elif status == 'shipped' %}<span class="inline-flex items-center text-xs font-medium rounded-full px-2.5 py-0.5" style="background-color: #0e74901a; color: #0e7490;">{{ label }}</span>{% elif status == 'cancelled' %}<span class="inline-flex items-center text-xs font-medium rounded-full px-2.5 py-0.5 bg-destructive/10 text-destructive">{{ label }}</span>{% else %}<span class="inline-flex items-center text-xs font-medium rounded-full px-2.5 py-0.5" style="background-color: #92400e1a; color: #92400e;">{{ label }}</span>{% endif %}
