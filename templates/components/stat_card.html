{% load apex %}
<div class="rounded-lg border border-border bg-card p-4 flex flex-col gap-3">
  <div class="flex items-start justify-between">
    <p class="text-sm font-medium text-muted-foreground">{{ label }}</p>
    {% if icon %}
      <span class="inline-flex h-9 w-9 items-center justify-center rounded-md"
            style="background-color: {{ accent }}1a; color: {{ accent }};">
        {% icon icon 18 %}
      </span>
    {% endif %}
  </div>
  <div>
    <p class="text-2xl font-bold tracking-tight">{{ value }}</p>
    <p class="mt-1 text-xs flex items-center gap-1 {% if trend == 'up' %}text-success{% else %}text-destructive{% endif %}">
      {% if trend == 'up' %}{% icon "arrow-up-right" 12 %}{% else %}{% icon "arrow-down-right" 12 %}{% endif %}
      <span>{{ delta }} from last month</span>
    </p>
  </div>
  {% if spark %}
    <div class="stat-spark -mx-1 -mb-1 h-10"
         x-data="statSparkline({{ spark|safe }}, '{{ accent }}')"
         x-ref="spark"></div>
  {% endif %}
</div>
