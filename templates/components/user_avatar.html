{% load apex %}{% with sz=size|default:"h-9 w-9" text=text|default:"text-xs" %}{% if user.avatar %}<img src="{{ user.avatar.url }}" alt="" class="{{ sz }} rounded-full object-cover shrink-0" />{% else %}<span class="{{ sz }} {{ text }} rounded-full inline-flex items-center justify-center font-semibold text-white shrink-0" style="background-color: {{ user|avatar_color }};">{{ user|initials }}</span>{% endif %}{% endwith %}
