{% extends "base.html" %}
{% block title %}Tracker — Dashboard{% endblock %}
{% block content %}
<div class="max-w-6xl mx-auto px-4 py-8">

  <h1 class="text-2xl font-bold mb-6">Click Tracker</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">

    <!-- Nuovo broker -->
    <div class="bg-white rounded-xl shadow-sm p-6">
      <h2 class="text-sm font-semibold uppercase tracking-widest text-gray-500 mb-4">Nuovo Broker</h2>
      <form id="brokerForm" class="flex flex-col gap-3">
        {% csrf_token %}
        <input name="name" placeholder="Nome broker" required class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" />
        <input name="offer_url" placeholder="URL offerta (https://...)" required class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" />
        <button type="submit" class="bg-indigo-600 text-white rounded-lg px-4 py-2 text-sm font-semibold hover:bg-indigo-700">Aggiungi broker</button>
      </form>
    </div>

    <!-- Nuova campagna -->
    <div class="bg-white rounded-xl shadow-sm p-6">
      <h2 class="text-sm font-semibold uppercase tracking-widest text-gray-500 mb-4">Nuova Campagna</h2>
      <form id="campaignForm" class="flex flex-col gap-3">
        {% csrf_token %}
        <input name="name" placeholder="Nome campagna" required class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" />
        <select name="broker_id" id="brokerSelect" required class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
          <option value="">— Seleziona broker —</option>
        </select>
        <button type="submit" class="bg-indigo-600 text-white rounded-lg px-4 py-2 text-sm font-semibold hover:bg-indigo-700">Crea campagna</button>
      </form>
    </div>
  </div>

  <!-- Brokers -->
  <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
    <h2 class="text-sm font-semibold uppercase tracking-widest text-gray-500 mb-4">Broker</h2>
    <div id="brokersTable"></div>
  </div>

  <!-- Campagne -->
  <div class="bg-white rounded-xl shadow-sm p-6">
    <h2 class="text-sm font-semibold uppercase tracking-widest text-gray-500 mb-4">Campagne</h2>
    <div id="campaignsTable"></div>
  </div>

</div>

<script>
const CSRF = '{{ csrf_token }}';
const BASE = window.location.origin;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadBrokers() {
  const data = await fetch('/tracker/api/brokers/').then(r=>r.json());
  const sel = document.getElementById('brokerSelect');
  sel.innerHTML = '<option value="">— Seleziona broker —</option>' +
    data.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('');

  const wrap = document.getElementById('brokersTable');
  if (!data.length) { wrap.innerHTML = '<p class="text-gray-400 text-sm py-4 text-center">Nessun broker.</p>'; return; }
  wrap.innerHTML = `<table class="w-full text-sm"><thead><tr class="text-left text-xs text-gray-500 uppercase border-b">
    <th class="pb-2">ID</th><th class="pb-2">Nome</th><th class="pb-2">Offer URL</th><th class="pb-2"></th>
  </tr></thead><tbody>${data.map(b=>`<tr class="border-b last:border-0 hover:bg-gray-50">
    <td class="py-3 text-gray-400">#${b.id}</td>
    <td class="py-3 font-medium">${esc(b.name)}</td>
    <td class="py-3 font-mono text-xs text-gray-600">${esc(b.offer_url)}</td>
    <td class="py-3"><button onclick="delBroker(${b.id})" class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded hover:bg-red-200">Elimina</button></td>
  </tr>`).join('')}</tbody></table>`;
}

async function loadCampaigns() {
  const data = await fetch('/tracker/api/campaigns/').then(r=>r.json());
  const wrap = document.getElementById('campaignsTable');
  if (!data.length) { wrap.innerHTML = '<p class="text-gray-400 text-sm py-4 text-center">Nessuna campagna.</p>'; return; }
  wrap.innerHTML = `<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left text-xs text-gray-500 uppercase border-b">
    <th class="pb-2">Nome</th><th class="pb-2">Broker</th><th class="pb-2">Click</th><th class="pb-2">Lead</th><th class="pb-2">CR%</th><th class="pb-2">Link</th><th class="pb-2"></th>
  </tr></thead><tbody>${data.map(c=>`<tr class="border-b last:border-0 hover:bg-gray-50">
    <td class="py-3 font-medium">${esc(c.name)}</td>
    <td class="py-3 text-gray-600">${esc(c.broker)}</td>
    <td class="py-3"><span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-0.5 rounded-full">${c.clicks}</span></td>
    <td class="py-3"><span class="bg-green-100 text-green-800 text-xs font-bold px-2 py-0.5 rounded-full">${c.leads}</span></td>
    <td class="py-3">${c.cr}%</td>
    <td class="py-3 font-mono text-xs text-indigo-600">${BASE}/t/?cid=${c.id}</td>
    <td class="py-3 flex gap-2">
      <a href="/tracker/report/${c.id}/" class="text-xs bg-green-100 text-green-800 px-2 py-1 rounded hover:bg-green-200">Report</a>
      <button onclick="delCampaign(${c.id})" class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded hover:bg-red-200">Elimina</button>
    </td>
  </tr>`).join('')}</tbody></table></div>`;
}

async function delBroker(id) {
  if (!confirm('Eliminare broker?')) return;
  await fetch(`/tracker/api/brokers/${id}/delete/`, {method:'POST', headers:{'X-CSRFToken':CSRF}});
  loadBrokers(); loadCampaigns();
}

async function delCampaign(id) {
  if (!confirm('Eliminare campagna e tutti i click?')) return;
  await fetch(`/tracker/api/campaigns/${id}/delete/`, {method:'POST', headers:{'X-CSRFToken':CSRF}});
  loadCampaigns();
}

document.getElementById('brokerForm').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  await fetch('/tracker/api/brokers/', {method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},
    body: JSON.stringify({name:fd.get('name'), offer_url:fd.get('offer_url')})});
  e.target.reset(); loadBrokers();
});

document.getElementById('campaignForm').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  await fetch('/tracker/api/campaigns/', {method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},
    body: JSON.stringify({name:fd.get('name'), broker_id:parseInt(fd.get('broker_id'))})});
  e.target.reset(); loadCampaigns();
});

loadBrokers(); loadCampaigns();
</script>
{% endblock %}
