{% comment %}
Shared HTML email shell. Caller defines blocks `preheader`, `heading`, `body`, optional `cta_url` + `cta_label`.

All styles are inline (Outlook etc. drop <style> blocks). Layout uses
nested tables — the only reliable cross-client primitive.
{% endcomment %}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block subject %}{{ subject|default:"Apex Dashboard" }}{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#0f172a;-webkit-font-smoothing:antialiased;">

{# Preheader — invisible preview-text shown by mail clients next to the subject #}
<div style="display:none;max-height:0;overflow:hidden;mso-hide:all;font-size:1px;line-height:1px;color:#f8fafc;">
  {% block preheader %}{% endblock %}
</div>

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f8fafc;">
  <tr>
    <td align="center" style="padding:32px 16px;">

      {# Card #}
      <table role="presentation" width="560" cellspacing="0" cellpadding="0" border="0" style="max-width:560px;width:100%;background:#ffffff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;">

        {# Brand header #}
        <tr>
          <td style="padding:24px 32px 16px;border-bottom:1px solid #e2e8f0;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0">
              <tr>
                <td style="vertical-align:middle;">
                  <span style="display:inline-block;width:32px;height:32px;background:#16a34a;color:#ffffff;border-radius:6px;text-align:center;line-height:32px;font-weight:700;font-size:14px;">A</span>
                </td>
                <td style="vertical-align:middle;padding-left:10px;font-size:16px;font-weight:700;letter-spacing:-0.01em;color:#0f172a;">
                  Apex
                </td>
              </tr>
            </table>
          </td>
        </tr>

        {# Body #}
        <tr>
          <td style="padding:32px;">

            <h1 style="margin:0 0 12px;font-size:22px;line-height:1.3;font-weight:700;letter-spacing:-0.01em;color:#0f172a;">
              {% block heading %}{% endblock %}
            </h1>

            <div style="font-size:15px;line-height:1.55;color:#334155;">
              {% block body %}{% endblock %}
            </div>

            {% block cta %}
            {% if cta_url and cta_label %}
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:24px 0 8px;">
                <tr>
                  <td style="background:#16a34a;border-radius:6px;">
                    <a href="{{ cta_url }}"
                       style="display:inline-block;padding:12px 24px;color:#ffffff;text-decoration:none;font-weight:600;font-size:14px;font-family:inherit;">
                      {{ cta_label }}
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin:8px 0 0;font-size:12px;color:#64748b;">
                Or paste this link into your browser:
              </p>
              <p style="margin:4px 0 0;font-size:12px;color:#64748b;word-break:break-all;">
                <a href="{{ cta_url }}" style="color:#16a34a;text-decoration:underline;">{{ cta_url }}</a>
              </p>
            {% endif %}
            {% endblock %}

            {% block after_cta %}{% endblock %}

          </td>
        </tr>

        {# Footer #}
        <tr>
          <td style="padding:20px 32px;background:#f8fafc;border-top:1px solid #e2e8f0;font-size:12px;line-height:1.5;color:#64748b;">
            <p style="margin:0 0 4px;">
              You're receiving this because you {% block reason %}have an Apex account{% endblock %}.
            </p>
            <p style="margin:0;">
              {% block footer_extra %}If this wasn't you, you can safely ignore this email.{% endblock %}
            </p>
          </td>
        </tr>
      </table>

      {# Outside-card legal line #}
      <p style="margin:16px 0 0;font-size:11px;color:#94a3b8;text-align:center;">
        © Apex Dashboard
      </p>

    </td>
  </tr>
</table>

</body>
</html>
