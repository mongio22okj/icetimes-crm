<div class="xl:col-span-8 rounded-lg border border-border bg-card p-4"
     x-data="revenueChart()">
  <div class="flex items-center justify-between mb-4">
    <div>
      <h2 class="font-semibold">Revenue</h2>
      <p class="text-sm text-muted-foreground">Gross revenue by day</p>
    </div>
    <div class="flex gap-1 text-xs">
      <template x-for="r in ['7d','30d','90d']" :key="r">
        <button type="button" x-text="r" x-on:click="load(r)"
                :class="range === r ? 'bg-primary text-primary-foreground' : 'bg-muted text-muted-foreground hover:bg-muted/80'"
                class="px-3 h-8 rounded-md transition-colors"></button>
      </template>
    </div>
  </div>
  <div id="revenue-chart" class="h-[320px]"></div>
</div>
