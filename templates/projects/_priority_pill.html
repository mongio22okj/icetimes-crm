{% if priority == "high" %}
  <span class="inline-flex items-center gap-1 px-2 h-6 rounded-md text-xs font-medium bg-destructive/10 text-destructive"><span class="h-1.5 w-1.5 rounded-full bg-destructive"></span>High</span>
{% elif priority == "med" %}
  <span class="inline-flex items-center gap-1 px-2 h-6 rounded-md text-xs font-medium bg-amber-500/10 text-amber-600"><span class="h-1.5 w-1.5 rounded-full bg-amber-500"></span>Medium</span>
{% else %}
  <span class="inline-flex items-center gap-1 px-2 h-6 rounded-md text-xs font-medium bg-muted text-muted-foreground"><span class="h-1.5 w-1.5 rounded-full bg-muted-foreground"></span>Low</span>
{% endif %}
