{% load apex %}
<div class="flex items-start gap-3 -my-1">
  <span class="mt-0.5 inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-full
               {% if row.category == 'auth' %}bg-primary/10 text-primary
               {% elif row.category == 'customer' %}bg-success/10 text-success
               {% elif row.category == 'order' %}bg-amber-500/10 text-amber-600
               {% elif row.category == 'invoice' %}bg-purple-500/10 text-purple-600
               {% elif row.category == 'project' %}bg-indigo-500/10 text-indigo-500
               {% elif row.category == 'task' %}bg-rose-500/10 text-rose-500
               {% else %}bg-muted text-muted-foreground{% endif %}">
    {% icon row.icon|default:"activity" 14 %}
  </span>
  <div class="min-w-0">
    {% if row.url %}
      <a href="{{ row.url }}" class="text-sm hover:underline">
        <span class="font-medium">{{ row.actor.username|default:"system" }}</span>
        {{ row.verb }}
        <span class="font-medium">{{ row.label }}</span>
      </a>
    {% else %}
      <p class="text-sm">
        <span class="font-medium">{{ row.actor.username|default:"system" }}</span>
        {{ row.verb }}
        <span class="font-medium">{{ row.label }}</span>
      </p>
    {% endif %}
  </div>
</div>
