{% extends "layouts/auth.html" %}
{% block title %}404 · Page not found · Apex{% endblock %}
{% block auth_content %}
<div class="text-center">
  <p class="text-6xl font-bold text-primary mb-2">404</p>
  <h1 class="text-2xl font-bold tracking-tight mb-2">Page not found</h1>
  <p class="text-sm text-muted-foreground mb-6">

  </p>
  <a href="/" class="block w-full h-10 rounded-md bg-primary text-primary-foreground font-medium text-center leading-10">
    Back to dashboard
  </a>
</div>
{% endblock %}
