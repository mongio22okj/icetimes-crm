{% extends "layouts/auth.html" %}
{% block title %}Reset your password · Apex{% endblock %}
{% block auth_content %}
<h1 class="text-2xl font-bold tracking-tight mb-1">Reset your password</h1>
<p class="text-sm text-muted-foreground mb-6">Enter your email. We'll send a reset link.</p>
<form method="post" class="space-y-4">
  {% csrf_token %}
  <div>
    <label for="id_email" class="block text-sm font-medium mb-1">Email</label>
    <input id="id_email" type="email" name="email" required autofocus autocomplete="email"
           class="w-full h-10 rounded-md border border-input bg-background px-3 text-sm focus:outline-none focus:ring-2 focus:ring-ring/50 focus:border-ring placeholder:text-muted-foreground transition-colors">
  </div>
  <button type="submit" class="w-full h-10 rounded-md bg-primary text-primary-foreground font-medium">Send reset link</button>
</form>
<p class="mt-4 text-sm text-muted-foreground text-center">
  Remember your password? <a href="{% url 'login' %}" class="text-primary font-medium">Sign in</a>
</p>
{% endblock %}
