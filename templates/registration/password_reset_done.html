{% extends "layouts/auth.html" %}
{% block title %}Check your email · Apex{% endblock %}
{% block auth_content %}
<h1 class="text-2xl font-bold tracking-tight mb-1">Check your email</h1>
<p class="text-sm text-muted-foreground mb-6">
  We've sent a password reset link to the email address you provided.
  If you don't see it within a few minutes, check your spam folder.
</p>
<a href="{% url 'login' %}" class="block w-full h-10 rounded-md bg-primary text-primary-foreground font-medium text-center leading-10">
  Back to sign in
</a>
{% endblock %}
