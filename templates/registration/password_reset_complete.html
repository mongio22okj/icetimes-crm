{% extends "layouts/auth.html" %}
{% block title %}Password updated · Apex{% endblock %}
{% block auth_content %}
<h1 class="text-2xl font-bold tracking-tight mb-1">Password updated</h1>
<p class="text-sm text-muted-foreground mb-6">
  Your password has been successfully updated. You can now sign in with your new password.
</p>
<a href="{% url 'login' %}" class="block w-full h-10 rounded-md bg-primary text-primary-foreground font-medium text-center leading-10">
  Continue to sign in
</a>
{% endblock %}
