<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ title }}</title>
  <style>
    @page { size: A4 landscape; margin: 1.5cm; }
    body { font-family: -apple-system, "Segoe UI", "Helvetica Neue", sans-serif; color: #111; font-size: 10pt; }
    h1 { font-size: 16pt; margin: 0 0 0.25rem 0; }
    .meta { color: #666; font-size: 9pt; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 6px 8px; border-bottom: 1px solid #e5e7eb; text-align: left; vertical-align: top; }
    thead { background: #f3f4f6; }
    th { font-weight: 600; font-size: 9pt; text-transform: uppercase; letter-spacing: 0.04em; color: #374151; }
    tbody tr:nth-child(even) { background: #fafafa; }
    .footer { color: #999; font-size: 8pt; text-align: right; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  <p class="meta">{{ row_count }} row{{ row_count|pluralize }} · exported {{ now|date:"Y-m-d H:i" }}</p>
  <table>
    <thead>
      <tr>{% for col in columns %}<th>{{ col.label }}</th>{% endfor %}</tr>
    </thead>
    <tbody>
      {% for row in rows %}
        <tr>{% for cell in row %}<td>{{ cell }}</td>{% endfor %}</tr>
      {% endfor %}
    </tbody>
  </table>
  <div class="footer">Generated by Apex</div>
</body>
</html>
