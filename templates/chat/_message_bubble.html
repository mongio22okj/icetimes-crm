{% with mine=message.sender.pk|stringformat:"s" %}
{% if message.sender == request.user %}
  <div class="flex justify-end">
    <div class="max-w-md rounded-2xl bg-primary text-primary-foreground px-4 py-2">
      <p class="text-sm whitespace-pre-line">{{ message.body }}</p>
      <p class="text-[10px] opacity-70 text-right mt-1">{{ message.sent_at|date:"g:i a" }}</p>
    </div>
  </div>
{% else %}
  <div class="flex justify-start">
    <div class="max-w-md rounded-2xl bg-muted text-foreground px-4 py-2">
      <p class="text-sm whitespace-pre-line">{{ message.body }}</p>
      <p class="text-[10px] text-muted-foreground mt-1">{{ message.sent_at|date:"g:i a" }}</p>
    </div>
  </div>
{% endif %}
{% endwith %}
