{% extends "layouts/dashboard.html" %}
{% load apex %}
{% block title %}Welcome aboard · Apex{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto text-center py-20">
  <div class="mx-auto h-16 w-16 rounded-full bg-emerald-100 dark:bg-emerald-900/30 inline-flex items-center justify-center text-emerald-600 mb-6">
    {% icon "arrow-up-right" 28 %}
  </div>
  <h1 class="text-3xl font-bold tracking-tight">You're all set</h1>
  <p class="mt-3 text-muted-foreground">Onboarding complete. Welcome aboard.</p>
  <div class="mt-8 flex justify-center gap-2">
    <a href="/" class="h-10 px-6 rounded-md bg-primary text-primary-foreground inline-flex items-center font-medium text-sm">Go to dashboard</a>
    <a href="{% url 'wizard:start' %}" class="h-10 px-6 rounded-md border border-border inline-flex items-center text-sm hover:bg-accent">Start over</a>
  </div>
</div>
{% endblock %}
