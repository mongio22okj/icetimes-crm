{% extends "base.html" %}
{% load apex %}
{% block body %}
<main class="min-h-screen flex items-center justify-center bg-background p-4">
  <div class="w-full max-w-md">
    <a href="/" aria-label="Apex home" class="mb-6 flex items-center justify-center gap-2.5 font-semibold">
      <span class="h-9 w-9 rounded-md bg-primary text-primary-foreground inline-flex items-center justify-center">
        {% icon "package" 20 %}
      </span>
      <span class="text-lg tracking-tight">Apex</span>
    </a>
    <div class="rounded-lg border border-border bg-card p-6 shadow-sm">
      {% block auth_content %}{% endblock %}
    </div>
  </div>
</main>
{% endblock %}
