{% load apex %}
{% comment %}
IconPrefixInput template — Lucide icon inside the left edge.
{% endcomment %}
{% with attrs=widget.attrs %}
<div class="relative" data-widget="icon-prefix-input">
  <span class="absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground pointer-events-none">
    {% icon widget.icon 16 %}
  </span>
  <input type="{{ widget.type|default:'text' }}"
         name="{{ widget.name }}"
         {% if widget.value != None %}value="{{ widget.value }}"{% endif %}
         {% for k, v in attrs.items %}{% if k != 'class' %}{{ k }}="{{ v }}" {% endif %}{% endfor %}
         class="w-full {{ widget.size_input_classes }} pl-9 pr-3 rounded-md border border-input bg-background
                placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring/50 focus:border-ring
                transition-colors {{ attrs.class|default:'' }}" />
</div>
{% endwith %}
