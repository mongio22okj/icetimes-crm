{% extends "layouts/auth.html" %}
{% load apex %}
{% block title %}Offline · Apex{% endblock %}
{% block auth_content %}
<div class="text-center">
  <div class="mx-auto mb-4 inline-flex h-12 w-12 items-center justify-center rounded-full bg-muted text-muted-foreground">
    {% icon "alert-triangle" 22 %}
  </div>
  <h1 class="text-2xl font-bold tracking-tight mb-2">You're offline</h1>
  <p class="text-sm text-muted-foreground mb-6 leading-relaxed">
    Apex couldn't reach the server. Check your connection and try again —
    pages you've already visited may still work.
  </p>
  <button type="button"
          onclick="location.reload()"
          class="inline-flex w-full h-10 items-center justify-center rounded-md bg-primary text-primary-foreground font-medium">
    Try again
  </button>
</div>
{% endblock %}
